version: 2
updates:
  # ── GitHub Actions ────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    target-branch: "main"
    rebase-strategy: "auto"
    assignees:
      - "alihaidar0"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-all:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # ── Docker base image ─────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    target-branch: "main"
    rebase-strategy: "auto"
    assignees:
      - "alihaidar0"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 3

  # ── Pre-commit hooks ──────────────────────────────────────────────────
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    target-branch: "main"
    rebase-strategy: "auto"
    assignees:
      - "alihaidar0"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      pre-commit-hooks-all:
        patterns:
          - "*"
    open-pull-requests-limit: 3
