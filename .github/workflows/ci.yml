name: CI
on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  PYTHON_VERSION: "3.14"
  DJANGO_SETTINGS_MODULE: config.settings.testing
  SECRET_KEY: ci-dummy-secret-key-not-used-in-production
  DATABASE_URL: sqlite:///ci-test.db
jobs:
  detect:
    name: Detect project state
    runs-on: ubuntu-latest
    outputs:
      has-pyproject: ${{ steps.check.outputs.has-pyproject }}
      has-django:    ${{ steps.check.outputs.has-django }}
      has-uvlock:    ${{ steps.check.outputs.has-uvlock }}
    steps:
      - uses: actions/checkout@v6
      - name: Check for project files
        id: check
        run: |
          echo "──────────────────────────────────────────"
          echo "  Detecting project state..."
          echo "──────────────────────────────────────────"
          if [ -f "pyproject.toml" ]; then
            echo "has-pyproject=true"  >> "$GITHUB_OUTPUT"
            echo "✅ pyproject.toml found — Python project detected"
          else
            echo "has-pyproject=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No pyproject.toml — Tier 1: all checks skipped"
          fi
          if [ -f "manage.py" ]; then
            echo "has-django=true"  >> "$GITHUB_OUTPUT"
            echo "✅ manage.py found — Tier 3: full Django CI active"
          else
            echo "has-django=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No manage.py — Tier 2: pre-Django CI only"
          fi
          if [ -f "uv.lock" ]; then
            echo "has-uvlock=true"  >> "$GITHUB_OUTPUT"
            echo "✅ uv.lock found — locked installs enforced"
          else
            echo "has-uvlock=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No uv.lock — sync will generate one"
          fi
          echo ""
          echo "Summary:"
          echo "  pyproject.toml : $([ -f pyproject.toml ] && echo 'YES' || echo 'NO')"
          echo "  manage.py      : $([ -f manage.py ]      && echo 'YES' || echo 'NO')"
          echo "  uv.lock        : $([ -f uv.lock ]        && echo 'YES' || echo 'NO')"

# ── Job 2: Lint ───────────────────────────────────────────────────────────────
# Tier 2 + Tier 3. Fast: uses a standalone ruff install, no full uv sync.
  lint:
    name: "Lint · ruff"
    runs-on: ubuntu-latest
    needs: detect
    if: >
      needs.detect.outputs.has-pyproject == 'true' &&
      (github.event.pull_request.draft == false || github.event_name != 'pull_request')
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ needs.detect.outputs.has-uvlock == 'true' }}
      - name: Install ruff
        run: uv tool install ruff
      - name: ruff lint
        run: ruff check . --output-format=github
      - name: ruff format check
        run: ruff format . --check

  typecheck:
    name: "Type check · mypy"
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.has-pyproject == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ needs.detect.outputs.has-uvlock == 'true' }}
      - name: Install dependencies
        run: |
          if [ "${{ needs.detect.outputs.has-uvlock }}" == "true" ]; then
            echo "▶  uv.lock found — using frozen install"
            uv sync --frozen
          elif [ "${{ needs.detect.outputs.has-django }}" == "false" ]; then
            echo "▶  Pre-Django state — syncing without lockfile"
            uv sync
          else
            echo "❌ Django project detected but uv.lock is missing."
            echo "   Run: uv lock — then commit uv.lock before pushing."
            exit 1
          fi
      - name: mypy
        if: needs.detect.outputs.has-django == 'true'
        run: |
          TARGETS=""
          [ -d "config" ] && TARGETS="$TARGETS config"
          [ -d "apps"   ] && TARGETS="$TARGETS apps"
          if [ -n "$TARGETS" ]; then
            uv run mypy $TARGETS
          else
            echo "⏭  No config/ or apps/ directory found — skipping mypy"
          fi
      - name: mypy skipped (pre-Django)
        if: needs.detect.outputs.has-django == 'false'
        run: 'echo "⏭  Tier 2: mypy skipped — no Django source yet"'

  test:
    name: "Tests · pytest"
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.has-django == 'true'
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB:       test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL:          postgres://test_user:test_pass@localhost:5432/test_db
      REDIS_URL:             redis://localhost:6379/0
      CELERY_BROKER_URL:     redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ needs.detect.outputs.has-uvlock == 'true' }}
      - name: Install dependencies
        run: |
          if [ "${{ needs.detect.outputs.has-uvlock }}" == "true" ]; then
            echo "▶  uv.lock found — using frozen install"
            uv sync --frozen
          else
            echo "❌ Django project detected but uv.lock is missing."
            echo "   Run: uv lock — then commit uv.lock before pushing."
            exit 1
          fi
      - name: Run pytest with coverage
        run: uv run pytest --cov=. --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  django-check:
    name: "Django system check"
    runs-on: ubuntu-latest
    needs: [detect, test]
    if: needs.detect.outputs.has-django == 'true'
    env:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: "ci-deploy-check-placeholder-key-not-real-50chars!!"
      DATABASE_URL: sqlite:////tmp/check.db
      ALLOWED_HOSTS: "localhost"
      DEBUG: "False"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ needs.detect.outputs.has-uvlock == 'true' }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Django deploy check
        run: uv run python manage.py check --deploy

  security:
    name: "Security · pip-audit + Trivy"
    runs-on: ubuntu-latest
    needs: [detect, lint]
    if: needs.detect.outputs.has-pyproject == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: ${{ needs.detect.outputs.has-uvlock == 'true' }}
      - name: Install dependencies
        run: |
          if [ "${{ needs.detect.outputs.has-uvlock }}" == "true" ]; then
            uv sync --frozen
          elif [ "${{ needs.detect.outputs.has-django }}" == "false" ]; then
            uv sync
          else
            echo "❌ Django project detected but uv.lock is missing."
            echo "   Run: uv lock — then commit uv.lock before pushing."
            exit 1
          fi
      - name: pip-audit
        run: uv run pip-audit --skip-editable --ignore-vuln GHSA-5239-wwwm-4pmq
      # Trivy Dockerfile scan — pinned to immutable SHA (v0.35.0, safe post-supply-chain-attack)
      # See: https://github.com/aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23
      # DO NOT use @master or a mutable version tag — tags 0.0.1–0.34.2 were compromised March 19 2026.
      # Dependabot will open a PR when a newer safe version is released.
      - name: Trivy Dockerfile scan
        if: needs.detect.outputs.has-django == 'true'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: config
          scan-ref:  docker/Dockerfile.prod
          severity:  CRITICAL,HIGH
          exit-code: "1"

  ci-passed:
    name: CI Passed ✅
    runs-on: ubuntu-latest
    needs: [detect, lint, typecheck, test, django-check, security]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "──────────────────────────────────────────"
          echo "  CI Gate — evaluating job results"
          echo "──────────────────────────────────────────"
          if [[ "${{ needs.detect.outputs.has-pyproject }}" == "false" ]]; then
            echo "ℹ️  Tier 1: No project detected — all checks skipped"
            echo "   Open the repo in VS Code → 'Reopen in Container'"
            echo "   then follow the getting-started guide in the terminal."
            exit 0
          fi
          if [[ "${{ needs.detect.outputs.has-django }}" == "false" ]]; then
            echo "ℹ️  Tier 2: Pre-Django state"
            echo "   Active: lint, typecheck (stub), security (pip-audit)"
            echo "   Skipped: test, django-check, Trivy"
          else
            echo "✅ Tier 3: Full Django project"
            echo "   All checks active"
          fi
          echo ""
          FAILED=0
          check_job() {
            local name="$1"
            local result="$2"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ $name: $result"
              FAILED=1
            elif [[ "$result" == "skipped" ]]; then
              echo "⏭  $name: skipped (not applicable at current tier)"
            else
              echo "✅ $name: $result"
            fi
          }
          check_job "lint"         "${{ needs.lint.result }}"
          check_job "typecheck"    "${{ needs.typecheck.result }}"
          check_job "test"         "${{ needs.test.result }}"
          check_job "django-check" "${{ needs.django-check.result }}"
          check_job "security"     "${{ needs.security.result }}"
          echo ""
          if [[ "$FAILED" == "1" ]]; then
            echo "❌ CI gate FAILED — see failed jobs above"
            exit 1
          fi
          echo "✅ CI gate PASSED"